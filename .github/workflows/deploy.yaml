name: Build and Deploy Connect4 Wasm Engine

on:
  push:
    branches:
      - main  # Agar aapki branch 'master' hai toh yahan master kar dena

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64

      - name: Verify Emcc Installation
        run: emcc -v

      - name: Compile C++ to WebAssembly (with Multithreading)
        run: |
          emcc engine.cpp uci.cpp -std=c++17 -O3 \
            -s WASM=1 \
            -s USE_PTHREADS=1 \
            -s PTHREAD_POOL_SIZE=4 \
            -s EXPORTED_RUNTIME_METHODS='["stringToUTF8", "lengthBytesUTF8"]' \
            -s EXPORTED_FUNCTIONS='["_sendUciCommand", "_malloc", "_free"]' \
            --no-entry \
            -o engine.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
