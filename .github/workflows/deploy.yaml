name: Build and Deploy C4 Engine

on:
  push:
    branches:
      - main  # Jab bhi aap main branch par push karenge, ye trigger hoga
  workflow_dispatch: # Aap chahein to ise GitHub UI se manually bhi run kar sakte hain

# GitHub Pages par deploy karne ke liye permissions
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Emscripten (WASM Compiler)
        uses: mymindstorm/setup-emsdk@v14

      - name: Compile C++ to WebAssembly
        run: |
          emcc main.cpp engine.cpp uci.cpp \
            -o connect4_engine.js \
            -O3 -std=c++17 \
            -s USE_PTHREADS=1 \
            -s PTHREAD_POOL_SIZE=4 \
            -s WASM=1 \
            -s EXPORTED_RUNTIME_METHODS='["ccall", "cwrap"]' \
            -s ALLOW_MEMORY_GROWTH=1

      - name: Prepare Deployment Folder
        run: |
          mkdir dist
          # HTML, JS, CSS aur Service worker files copy karein
          cp index.html styles.css app.js engine-worker.js coi-serviceworker.js dist/
          # Emscripten se generate hui wasm, js aur worker files copy karein
          cp connect4_engine.* dist/

      - name: Upload Artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
