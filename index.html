<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4 Engine Analysis</title>
    
    <script src="coi-serviceworker.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .c4-cell {
            width: 3.5rem; height: 3.5rem;
            background-color: #111827;
            border-radius: 50%;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.6);
            position: relative; overflow: hidden;
        }
        .token {
            width: 100%; height: 100%; border-radius: 50%;
            position: absolute; top: 0; left: 0;
        }
        .token.p1 {
            background: radial-gradient(circle at 30% 30%, #fde047, #ca8a04);
            box-shadow: 0 4px 4px rgba(0,0,0,0.3);
        }
        .token.p2 {
            background: radial-gradient(circle at 30% 30%, #f87171, #b91c1c);
            box-shadow: 0 4px 4px rgba(0,0,0,0.3);
        }
        @keyframes drop {
            0% { transform: translateY(-300px); opacity: 0; }
            60% { transform: translateY(10px); opacity: 1; }
            80% { transform: translateY(-5px); }
            100% { transform: translateY(0); }
        }
        .token-drop { animation: drop 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .col-interactive { cursor: pointer; border-radius: 999px; transition: background-color 0.2s; }
        .col-interactive:hover { background-color: rgba(255, 255, 255, 0.1); }
        .col-interactive:hover .c4-cell.empty.preview-target::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%; opacity: 0.4;
        }
        .col-interactive.hover-p1:hover .c4-cell.empty.preview-target::after { background: #ca8a04; }
        .col-interactive.hover-p2:hover .c4-cell.empty.preview-target::after { background: #b91c1c; }
        .move-badge {
            padding: 0.15rem 0.4rem; border-radius: 0.25rem; background-color: #374151;
            color: #d1d5db; cursor: pointer; transition: all 0.2s;
        }
        .move-badge:hover { background-color: #4b5563; }
        .move-badge.active { background-color: #3b82f6; color: #ffffff; font-weight: bold; }
    </style>

    <script src="connect4_engine.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans h-screen flex flex-col overflow-hidden">

    <header class="bg-gray-800 p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-400">C4<span class="text-white">Analysis</span></h1>
        <div class="flex space-x-3">
            <span id="engine-status" class="px-3 py-1 rounded-full bg-red-900 text-red-300 text-xs font-bold uppercase tracking-wide">Loading Wasm...</span>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row p-4 gap-6 max-w-7xl mx-auto w-full h-full overflow-hidden">
        
        <div class="hidden md:flex flex-col items-center justify-end w-12 bg-gray-800 rounded-lg overflow-hidden border border-gray-700 relative">
            <div id="eval-fill" class="w-full bg-gray-200 transition-all duration-500 ease-out" style="height: 50%;"></div>
            <div id="eval-text" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 font-bold text-sm mix-blend-difference text-white">0.0</div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center min-w-0">
            <div id="board-container" class="relative bg-blue-700 p-3 rounded-xl shadow-2xl border-4 border-blue-800">
                <div id="grid" class="grid grid-cols-7 gap-2"></div>
            </div>
            
            <div class="mt-6 flex space-x-4">
                <button id="btn-flip" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded font-semibold transition">Flip Board</button>
                <button id="btn-undo" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded font-semibold transition">Take Back</button>
                <button id="btn-reset" class="bg-red-900 hover:bg-red-800 px-4 py-2 rounded font-semibold text-red-100 transition">Reset</button>
            </div>
        </div>

        <div class="w-full md:w-80 flex flex-col bg-gray-800 rounded-lg border border-gray-700 overflow-hidden">
            <div class="p-4 border-b border-gray-700 bg-gray-850">
                <h2 class="text-sm text-gray-400 font-bold uppercase tracking-wider mb-2">Live Engine Evaluation</h2>
                <div class="grid grid-cols-2 gap-2 text-sm">
                    <div class="bg-gray-900 p-2 rounded">
                        <span class="block text-gray-500 text-xs">Depth</span>
                        <span id="stat-depth" class="font-mono font-bold text-blue-300">0</span>
                    </div>
                    <div class="bg-gray-900 p-2 rounded">
                        <span class="block text-gray-500 text-xs">Score</span>
                        <span id="stat-score" class="font-mono font-bold text-white">0.0</span>
                    </div>
                    <div class="bg-gray-900 p-2 rounded col-span-2 flex justify-between">
                        <div>
                            <span class="block text-gray-500 text-xs">Nodes</span>
                            <span id="stat-nodes" class="font-mono text-gray-300">0</span>
                        </div>
                        <div class="text-right">
                            <span class="block text-gray-500 text-xs">NPS</span>
                            <span id="stat-nps" class="font-mono text-gray-300">0</span>
                        </div>
                    </div>
                </div>
                
                <div class="mt-3">
                    <span class="block text-gray-500 text-xs mb-1">Engine best line (PV):</span>
                    <div id="stat-pv" class="flex space-x-1 overflow-x-auto pb-1 font-mono text-xs text-blue-200">
                        <span class="text-gray-600 italic">Waiting...</span>
                    </div>
                </div>
            </div>

            <div class="flex-1 flex flex-col p-4 overflow-hidden">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-sm text-gray-400 font-bold uppercase tracking-wider">Move History</h2>
                    <label class="flex items-center space-x-2 text-xs cursor-pointer">
                        <input type="checkbox" id="toggle-engine" class="form-checkbox text-blue-500 rounded" checked>
                        <span>Engine On</span>
                    </label>
                </div>
                <div id="move-history" class="flex-1 overflow-y-auto bg-gray-900 rounded p-2 text-sm font-mono flex flex-wrap content-start gap-1"></div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
