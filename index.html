<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4 Analysis Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="coi-serviceworker.js"></script>

    <style>
        /* Smooth transition for the Eval Bar */
        .eval-transition {
            transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Smooth bounce animation for dropping pieces */
        @keyframes dropIn {
            0% { transform: translateY(-400%); opacity: 0; }
            60% { transform: translateY(5%); opacity: 1; }
            80% { transform: translateY(-5%); }
            100% { transform: translateY(0); }
        }
        .piece-drop {
            animation: dropIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        /* Glowing blue board casing */
        .board-casing {
            box-shadow: 0 0 30px rgba(37, 99, 235, 0.4), inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* Hover preview for columns */
        .col-hover-group:hover .preview-piece {
            opacity: 0.5;
        }
        
        /* Custom scrollbar for move history */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 h-screen flex flex-col font-sans overflow-hidden">

    <header class="bg-slate-950 px-6 py-3 border-b border-slate-800 flex justify-between items-center shadow-md z-10">
        <div class="flex items-center gap-3">
            <div class="w-4 h-4 rounded-full bg-blue-500 animate-pulse" id="engine-status-indicator"></div>
            <h1 class="text-xl font-bold tracking-wide">C4<span class="text-blue-500">Engine</span> Analysis</h1>
        </div>
        <div class="text-sm text-slate-400 font-mono" id="engine-status-text">Engine Ready</div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row gap-6 p-4 md:p-6 overflow-hidden">
        
        <aside class="hidden md:flex flex-col w-12 bg-slate-800 rounded-lg overflow-hidden border border-slate-700 relative shadow-inner">
            <div id="eval-fill" class="w-full bg-slate-200 absolute bottom-0 eval-transition" style="height: 50%;"></div>
            
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <span id="eval-score" class="font-mono font-bold text-sm bg-slate-900/60 px-1 rounded backdrop-blur-sm text-white mix-blend-difference">
                    0.0
                </span>
            </div>
        </aside>

        <section class="flex-1 flex items-center justify-center">
            <div class="relative">
                <div id="board-container" class="flex gap-2 p-3 bg-blue-700 rounded-xl board-casing border-4 border-blue-600 relative z-10">
                    </div>
            </div>
        </section>

        <aside class="w-full md:w-80 flex flex-col gap-4 overflow-hidden">
            
            <div class="bg-slate-800 border border-slate-700 rounded-lg p-4 shadow-lg flex flex-col gap-3">
                <div class="flex justify-between items-end border-b border-slate-700 pb-2">
                    <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Engine Analysis</h2>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="engine-toggle" class="sr-only peer" checked>
                        <div class="w-9 h-5 bg-slate-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-500"></div>
                    </label>
                </div>
                
                <div class="grid grid-cols-2 gap-2 text-sm font-mono">
                    <div class="bg-slate-900/50 p-2 rounded">
                        <div class="text-slate-500 text-[10px] uppercase">Depth</div>
                        <div id="stat-depth" class="font-bold text-blue-400">0</div>
                    </div>
                    <div class="bg-slate-900/50 p-2 rounded">
                        <div class="text-slate-500 text-[10px] uppercase">NPS</div>
                        <div id="stat-nps" class="font-bold text-green-400">0</div>
                    </div>
                    <div class="col-span-2 bg-slate-900/50 p-2 rounded flex justify-between items-center">
                        <div class="text-slate-500 text-[10px] uppercase">Total Nodes</div>
                        <div id="stat-nodes" class="font-bold">0</div>
                    </div>
                </div>

                <div class="mt-1">
                    <div class="text-slate-500 text-[10px] uppercase mb-1">Best Line (PV)</div>
                    <div id="pv-container" class="flex flex-wrap gap-1 min-h-[28px] font-mono text-sm">
                        <span class="text-slate-400 italic">Waiting for engine...</span>
                    </div>
                </div>
            </div>

            <div class="flex-1 bg-slate-800 border border-slate-700 rounded-lg shadow-lg flex flex-col min-h-0">
                <div class="p-3 border-b border-slate-700 flex justify-between items-center">
                    <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Move History</h2>
                </div>
                <div id="move-history-tree" class="flex-1 overflow-y-auto p-3 font-mono text-sm flex flex-col gap-1">
                    </div>
            </div>

            <div class="grid grid-cols-2 gap-2 mt-auto">
                <button id="btn-undo" class="bg-slate-700 hover:bg-slate-600 active:bg-slate-500 text-white font-semibold py-2 px-4 rounded transition-colors text-sm">
                    Undo Move
                </button>
                <button id="btn-flip" class="bg-slate-700 hover:bg-slate-600 active:bg-slate-500 text-white font-semibold py-2 px-4 rounded transition-colors text-sm">
                    Flip Board
                </button>
                <button id="btn-reset" class="col-span-2 bg-red-600 hover:bg-red-500 active:bg-red-700 text-white font-semibold py-2 px-4 rounded transition-colors text-sm">
                    Reset Board
                </button>
            </div>
        </aside>
    </main>

    <script src="main.js"></script>
</body>
</html>
